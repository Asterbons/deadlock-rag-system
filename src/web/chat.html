<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock AI - Chat</title>
    <style>
        :root {
            --bg: #07100f;
            --bg-card: #0b1a1a;
            --border: #274443;
            --text: #e8dcc0;
            --text-dim: #7a8c8a;
            --gold: #c9a96e;
            --accent: #2f6b68;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 4px;
            max-width: 80%;
        }
        .user { background: var(--accent); align-self: flex-end; }
        .assistant { background: var(--bg-card); border: 1px solid var(--border); align-self: flex-start; }
        
        #input-area {
            border-top: 1px solid var(--border);
            padding: 20px;
            background: var(--bg-card);
        }
        #input-form {
            display: flex;
            gap: 12px;
        }
        #input-field {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 4px;
        }
        button {
            background: var(--gold);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Usage Bar Styles */
        #usage-bar {
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            font-size: 11px;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            font-family: monospace;
        }
        #usage-bar span {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="chat-window"></div>
    
    <div id="usage-bar" style="display: none;">
        <span id="usage-last"></span>
        <span id="usage-session"></span>
    </div>

    <div id="input-area">
        <form id="input-form">
            <input type="text" id="input-field" placeholder="Type your query..." autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        let sessionTotalTokens = 0;
        let sessionTotalCost = 0.0;
        let lastRequestTokens = 0;
        let lastRequestCost = 0.0;

        const chatWindow = document.getElementById('chat-window');
        const inputForm = document.getElementById('input-form');
        const inputField = document.getElementById('input-field');

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        inputForm.onsubmit = async (e) => {
            e.preventDefault();
            const q = inputField.value.trim();
            if (!q) return;
            inputField.value = '';
            
            addMessage('user', q);
            const assistantDiv = addMessage('assistant', '');
            
            const response = await fetch('/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q, history: [] })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = JSON.parse(line.slice(6));
                        
                        if (data.type === 'token') {
                            assistantDiv.textContent += data.content;
                        } else if (data.type === 'usage') {
                            lastRequestTokens = data.total_tokens;
                            lastRequestCost = data.cost_usd;
                            sessionTotalTokens += data.total_tokens;
                            sessionTotalCost += data.cost_usd;
                            updateUsageBar(data);
                        } else if (data.type === 'done') {
                            // finished
                        }
                    }
                }
            }
        };

        function updateUsageBar(data) {
            const bar = document.getElementById('usage-bar');
            const last = document.getElementById('usage-last');
            const session = document.getElementById('usage-session');

            bar.style.display = 'flex';

            // Format cost — show in cents if less than $0.01
            function formatCost(usd) {
                if (usd === 0) return '';
                if (usd < 0.01) return `($${(usd * 100).toFixed(3)}¢)`;
                return `($${usd.toFixed(4)})`;
            }

            last.textContent =
                `Last: ${data.prompt_tokens.toLocaleString()} in + ` +
                `${data.completion_tokens.toLocaleString()} out = ` +
                `${data.total_tokens.toLocaleString()} tokens ` +
                formatCost(data.cost_usd);

            session.textContent =
                `Session: ${sessionTotalTokens.toLocaleString()} tokens ` +
                formatCost(sessionTotalCost);
        }
    </script>
</body>
</html>
