services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: deadlock
      POSTGRES_USER: deadlock
      POSTGRES_PASSWORD: deadlock
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./src/meta/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deadlock"]
      interval: 5s
      timeout: 5s
      retries: 5
